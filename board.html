<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/img/join-logo.png" type="image/x-icon" />
    <title>JOIN - Board</title>
    <link rel="stylesheet" href="./css/board.css">
    <link rel="stylesheet" href="./css/board-2.css">
    <link rel="stylesheet" href="./css/header-sidebar.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./responsive-css/summary-responsive.css">
    <link rel="stylesheet" href="./responsive-css/board-responsive.css">
    <link rel="stylesheet" href="./responsive-css/contacts-responsive.css">
    <script src="./js/config.js"></script>
    <script src="./js/tasksDragNDrop.js"></script>
    <script src="./js/loginRequired.js"></script>
    <script src="./js/board.js"></script>
</head>

<body style="display: none;">
    <div onclick="closeShowTask()" id="show-Task-Background" class="show-Task-Background d-none">
        <div onclick="event.stopPropagation()" id="showTask" class="showTask"></div>
    </div>
    <div onclick="closePopup()" id="show-AddTask-Background" class="show-Task-Background d-none">
        <div id="show-addTaskInclude"></div>
    </div>

    <div class="header">
        <a href="/"><img class="new-logo d-none" src="./assets/img/join-logo.png"></a>
        <span class="sub-header">Kanban Project Management Tool </span>
        <div id="header-contacts" class="head-container-right">
            <a href="./help.html"><img src="./assets/img/question.png"></a>
            <a class="legal-notice-mobile" href="./legal-notice.html"><img src="./assets/img/info-logo.png"></a>
            <div id="profile-actions" class="head-profile-img" onmouseover="showLogout()"></div>
            <div id="header-logout" onmouseout="hideLogout()" class="header-logout">
                <button id="logout-btn"> Log-out? </button>
            </div>
        </div>
    </div>

    <div class="sidebar-header" id="sidebar-header">
        <a href="/">
            <div class="sidebar-top">
                <img id="join-logo" class="join-logo-head" src="./assets/img/join-logo-white.png">
            </div>
        </a>

        <div class="sidebar-mid">
            <div class="sidebar-center">
                <a class="sidebar-link" id="sidebar-link0" href="./">
                    <div class="link-name">
                        Summary
                    </div>
                    <div>
                        <img class="link-img" src="./assets/img/summary-logo.png">
                    </div>
                </a>
                <a id="sidebar-link1" style="background-color: #091931;" href="./board.html">
                    <div class="link-name">
                        Board
                    </div>
                    <div>
                        <img class="link-img" src="./assets/img/board-logo.png">
                    </div>
                </a>
                <a class="sidebar-active" id="sidebar-link2" href="./add-task.html">
                    <div class="link-name">
                        Add Task
                    </div>
                    <div>
                        <img class="link-img" src="./assets/img/add-task-logo.png">
                    </div>
                </a>
                <a id="sidebar-link3" href="./contacts.html">
                    <div class="link-name">
                        Contacts
                    </div>
                    <div>
                        <img class="link-img" src="./assets/img/contacts-logo.png">
                    </div>
                </a>
            </div>
        </div>
        <a class="sidebar-bottom" href="./legal-notice.html">Legal notice
            <div class="sidebarBottomLegalNotice">
                <img src="./assets/img/info-logo.png">
            </div>
        </a>
    </div>
    <div class="page">
        <div class="content">

            <div class="headline-board">
                <span>Board</span>
                <div class="add-search-bar">
                    <input id="search-task" onkeyup="searchTasks()" class="search-task" type="text" placeholder="Find task">
                    <button onclick="addNewTaskBoard('todo-box')" class="log-in-btn">Add task +</button>
                    <div id="search-results" class="search-results"></div>
                </div>
            </div>
            <div class="task-sections">
                <div id="todo" class="task"  ondrop="moveTo(event, 'todo')" ondragover="allowDrop(event)">
                    <div class="section-header">
                        <span>To do</span>
                        <img onclick="addNewTaskBoard('todo-box')" src="./assets/img/plus-button.png">
                    </div>
                    <div id="todo-box" class="task-box"></div>
                </div>
                <div id="in-progress" class="task" ondrop="moveTo(event, 'in-progress')"  ondragover="allowDrop(event)">
                    <div class="section-header">
                        <span>In progress</span>
                        <img onclick="addNewTaskBoard('inprogress-box')" src="./assets/img/plus-button.png">
                    </div>
                    <div id="inprogress-box" class="task-box"></div>
                </div>
                <div id="awaiting-feedback" class="task" ondrop="moveTo(event, 'awaiting-feedback')" ondragover="allowDrop(event)">
                    <div class="section-header">
                        <span>Awaiting Feedback</span>
                        <img onclick="addNewTaskBoard('feedback-box')" src="./assets/img/plus-button.png">
                    </div>
                    <div id="feedback-box" class="task-box"></div>
                </div>
                <div id="done" class="task" ondrop="moveTo(event, 'done')" ondragover="allowDrop(event)" class="task-box">
                    <div class="section-header">
                        <span>Done</span>
                        <img onclick="addNewTaskBoard('done-box')" src="./assets/img/plus-button.png">
                    </div>
                    <div id="done-box" class="task-box"></div>
                </div>

                <div id="loader" class="loader-background">
                    <div class="loader"></div>
                </div>
                <div id="taskPopup" class="task-popup" style="display: none;">
                    <div class="popup-content">
                        <span class="close-btn" onclick="closePopup()">&times;</span>
                        <div class="popupCategory">
                            <label for="popupCategoryInput" style="display: none;">Category:</label>
                            <div id="popupCategory" class="popup-data"></div>
                            <label class="d-none" for="popupCategoryInput">Category:</label>
                            <div class="addToTaskInputSection d-none" id="popupCategoryContainer">
                                <span class="addTask-Subheaders" style="display: none;">Category*</span>
                                <select id="popupCategoryInput" class="addTotaskInputField">
                                    <option value="technicalTask">Technical Task</option>
                                    <option value="userStory">User Story</option>
                                </select>
                            </div>
                        </div>                                           
                        <div class="popupTitle">
                            <label for="popupTitle" style="display: none;">Title:</label>
                            <div id="popupTitle" class="popup-data"></div>
                            <label class="d-none" for="popupTitleInput" style="display: none;">Title:</label>
                            <input class="edit-task d-none" type="text" id="popupTitleInput">
                        </div>
                        <div class="popupDescription">
                            <label for="popupDescriptionInput" style="display: none;">Description:</label>
                            <div id="popupDescription" class="popup-data"></div>
                            <label class="d-none" for="popupDescriptionInput">Description:</label>
                            <input class="edit-task d-none" type="text" id="popupDescriptionInput">
                        </div>
                        <div class="popupDueDate">
                            <label for="popupDueDateInput">Due Date:</label>
                            <div id="popupDueDate" class="popup-data"></div>
                            <label class="d-none" for="popupDueDateInput" style="display: none;">Due Date:</label>
                            <input class="d-none" type="date" id="popupDueDateInput">
                        </div>
                        <div class="popupPrio">
                            <div id="popupPrio" class="popup-data"></div>
                            <div class="priority-container d-none" id="popupPrioInput">
                                <label id="popupPrioInputLabel" for="popupPrioInput">Priority:</label>

                                <div>
                                    <div id="prio-urgent" onclick="changePriority('urgent')" class="priority-icons">Urgent
                                        <img id="img-prio-urgent" src="./assets/img/prio-urgent-solo.png"
                                            alt="Priority urgent">
                                    </div>
                                    <div id="prio-medium" onclick="changePriority('medium')" class="priority-icons">Medium
                                        <img id="img-prio-medium" src="./assets/img/prio-medium-solo.png"
                                            alt="Priority medium">
                                    </div>
                                    <div style="background-color: #7ae229;color: #ffffff;" id="prio-low"
                                        onclick="changePriority('low')" class="priority-icons">Low
                                        <img id="img-prio-low" src="./assets/img/prio-low-white.png" alt="Priority low">
                                    </div>
                                    <div id="input-prio" type="text" class="d-none"></div>
                                </div>
                            </div>
                        </div>
                        <div class="popupAssignedTo">
                            <label for="popupAssignedToInput">Assigned to:</label>
                            <div id="popupAssignedTo" class="popup-data"></div>
                            <!-- <label class="d-none" for="popupAssignedToInput">Assigned to:</label> -->
                            <select class="d-none" id="popupAssignedToInput" class="addTotaskInputField">
                            </select>
                            </div>
                        </div>
                        <div class="popupSubtasks">
                            <!-- <label class="d-none" for="popupSubtasksInput">Add Subtask:</label> -->
                            <input class="d-none" type="text" id="popupSubtasksInput" placeholder="Enter subtask and press Enter">
                            <label for="popupSubtasksInput">Subtasks</label>
                            <div id="subtasksContainer" class="popup-data"></div>
                        </div>
                        <div id="taskOptions">
                        </div>
                    </div>
                </div>
                <div id="overlay" style="display:none;" onclick="closePopup()"></div>
                <div id="deleteOverlay" class="overlay d-none" onclick="closeDeletePopup()"></div>
                <div id="deleteTaskPopup" class="delete-task-popup d-none">

                    <div class="popup-content">
                        <h2>Delete Task</h2>
                        <p style="white-space: nowrap;">Are you sure you want to delete this task?</p>
                        <button onclick="confirmDelete()">Yes, delete</button>
                        <button onclick="closeDeletePopup()">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
